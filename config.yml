# =============================================================================
# config.yml — DevContainer-Native Parallel Skill Runner
# =============================================================================
#
# This file must be in your AUDIT_BASE_DIR alongside:
#   project-one/       — Your actual project directories to audit
#   project-two/       — Another project directory
#
# The .claude/ directory is mounted read-only from the framework root.
# No need to copy CLAUDE.md or .claude/ to AUDIT_BASE_DIR.
#
# AUDIT_BASE_DIR is set in your .env file (see .env.example for structure)
#
# DEVCONTAINER ARCHITECTURE
#   The orchestrator spawns N isolated Docker containers (one per project+skill).
#   Each container:
#     - Is built from .devcontainer/Dockerfile (or uses cached image)
#     - Mounts .claude/ read-only from framework directory
#     - Mounts project directory and .analysis/ read-write
#     - Runs ONE skill in complete isolation
#     - Is destroyed after completion (ephemeral)
#
#   The .claude/ directory is mounted read-only into each container from the
#   framework root - no file copying needed. Each container gets isolated access.
#
# Duplicate skills listed for the same directory run as separate containers —
# each skill execution is fully isolated.
#
# API KEY
#   The ANTHROPIC_API_KEY environment variable is required.
#   Set via: export ANTHROPIC_API_KEY="sk-ant-..."
#   It CANNOT be set in this config.yml file for security reasons.
#
# PERMISSION MODE
#   Containers run Claude with 'bypassPermissions' for autonomous operation.
#   This cannot be changed via configuration for security and reliability.
#
# =============================================================================

runner:
  model:            claude-sonnet-4-6  # claude-sonnet-4-6 | claude-opus-4-6
  concurrency:      3                  # max parallel tasks (containers)
  max_turns:        20                 # max agent turns per skill run
  timeout:          300                # seconds per task
  max_budget_usd:   10.0               # PER-TASK spending limit (USD)
                                        # Typical: $0.50-$2 (small), $2-$6 (medium), $6-$15 (large)
                                        # Task stops gracefully if exceeded, partial results preserved
                                        # See README.md "Cost Estimation" for details

  # DevContainer-specific settings
  image_tag:        audit-runner:local # Docker image tag for devcontainer
                                        # Built from .devcontainer/Dockerfile
                                        # Uses Docker layer caching for fast rebuilds
  rebuild:          false               # Force rebuild image even if it exists
                                        # Set to true to rebuild after Dockerfile changes
                                        # Or use: FORCE_REBUILD=true environment variable

targets:
  - dir: project-one
    skills:
      - /audit-java
      - /audit-javascript

  - dir: project-two
    skills:
      - /audit-dotnet
# =============================================================================
# DEBUG CONFIGURATION
# =============================================================================
# When enabled, provides verbose logging for diagnosing issues:
#   - Full SDK messages (no truncation of assistant/tool outputs)
#   - Tool command execution details (via bash set -x)
#   - Timing instrumentation for tasks
#   - Environment and startup diagnostics
#
# ⚠️  WARNING: Debug mode generates significantly larger log files
#     (10-100x normal size) due to untruncated message logging and
#     verbose tool output. Error messages are NEVER truncated regardless
#     of this setting - they are always logged in full.
#
# Use debug mode when:
#   - Tasks start but make no API progress
#   - Tools fail silently with no clear error
#   - You need to verify API usage in real-time
#   - Diagnosing performance bottlenecks
#
# See README.md "Debugging" section for details.
# =============================================================================
debug:
  enabled: false  # Set to true for verbose diagnostic logging
