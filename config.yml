# =============================================================================
# config.yml — Claude Parallel Skill Runner
# =============================================================================
#
# This file must be in your AUDIT_BASE_DIR alongside:
#   CLAUDE.md          — Claude agent instructions
#   .claude/           — Shared skills and agents
#   project-one/       — Your actual project directories to audit
#   project-two/       — Another project directory
#
# AUDIT_BASE_DIR is set in your .env file (see .env.example for structure)
#
# At startup, CLAUDE.md and .claude/ are copied into each configured project
# directory. Any existing CLAUDE.md or .claude/ in those directories is
# renamed with an OLD- prefix first. This ensures each project gets a clean,
# isolated copy of the audit configuration.
#
# Duplicate skills listed for the same directory are automatically skipped —
# each skill runs exactly once per directory.
#
# API KEY
#   The ANTHROPIC_API_KEY environment variable is read from your .env file.
#   It CANNOT be set in this config.yml file for security reasons.
#   See .env.example for setup instructions.
#
# PERMISSION MODE
#   Hardcoded to 'bypassPermissions' for autonomous Docker operation.
#   This cannot be changed via configuration for security and reliability.
#
# =============================================================================

runner:
  model:            claude-sonnet-4-6  # claude-sonnet-4-6 | claude-opus-4-6
  concurrency:      3                  # max parallel tasks
  max_turns:        20                 # max agent turns per skill run
  timeout:          300                # seconds per task
  max_budget_usd:   10.0               # spending limit per task (USD)

targets:
  - dir: project-one
    skills:
      - /audit-java
      - /audit-javascript

  - dir: project-two
    skills:
      - /audit-dotnet
