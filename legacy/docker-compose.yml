# =============================================================================
# docker-compose.yml
# =============================================================================
# Set AUDIT_BASE_DIR and ANTHROPIC_API_KEY in .env
#
# AUDIT_BASE_DIR must be the PARENT directory containing:
#   - config.yml (audit configuration)
#   - CLAUDE.md (agent instructions)
#   - .claude/ (skills and agents)
#   - project-one/, project-two/, etc. (your actual projects)
#
# See .env.example for detailed directory structure diagram.
#
# Usage:
#   cp .env.example .env      # configure AUDIT_BASE_DIR and ANTHROPIC_API_KEY
#   docker compose build
#   docker compose run --rm skills
# =============================================================================

# DEPRECATED: This file is deprecated as of 2026-03-07
# Use orchestrator_devcontainer.py instead
# See legacy/README.md for details

services:
  skills:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-skill-runner:latest
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      # Mount strategy: Read-only for configs, read-write only where needed
      # This enforces security at the Docker level, not just deny lists
      - ${AUDIT_BASE_DIR}/config.yml:/workdir/config.yml:ro
      - ${AUDIT_BASE_DIR}/CLAUDE.md:/workdir/CLAUDE.md:ro
      - ${AUDIT_BASE_DIR}/.claude:/workdir/.claude:ro
      - ${AUDIT_BASE_DIR}/logs:/workdir/logs:rw
      # Project directories: mount with subdirectory strategy
      # Source code: read-only, .analysis: read-write via bind mounts
      # Note: This requires projects to exist at fixed paths
      # For dynamic project discovery, see alternative configuration below
      - ${AUDIT_BASE_DIR}:/workdir:rw
      # TODO: Once we implement structured output validation, we can make
      # source directories truly read-only with separate .analysis mounts
    # network_mode: "none"  # Disabled - skills require network access for:
    #   - Claude API calls (api.anthropic.com)
    #   - Vulnerability research (WebFetch/WebSearch for CVE data, security advisories)
    #   - Up-to-date security information (OWASP, GitHub advisories, Snyk, etc.)
    # Security relies on ephemeral containers and limited filesystem access instead
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    restart: "no"

  # Alternative configuration for strict read-only enforcement
  # Uncomment and configure project paths manually for maximum security
  # skills-strict:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   image: claude-skill-runner:latest
  #   environment:
  #     - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
