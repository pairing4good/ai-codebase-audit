  #     - ${AUDIT_BASE_DIR}/logs:/workdir/logs:rw
  #     # Per-project mounts (read-only source, read-write analysis)
  #     - ${AUDIT_BASE_DIR}/project-one:/workdir/project-one:ro
  #     - ${AUDIT_BASE_DIR}/project-one/.analysis:/workdir/project-one/.analysis:rw
  #     - ${AUDIT_BASE_DIR}/project-two:/workdir/project-two:ro
  #     - ${AUDIT_BASE_DIR}/project-two/.analysis:/workdir/project-two/.analysis:rw
